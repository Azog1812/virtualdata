global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-host'
    static_configs:
      - targets: ['localhost:9100']
        labels:
          instance_name: 'vps-host'

  - job_name: 'node-vms'
    static_configs:
      - targets: ['172.16.100.3:9100', '172.16.100.4:9100']
        labels:
          environment: 'dev'
