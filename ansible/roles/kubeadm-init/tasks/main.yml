---
- name: Check if cluster is already initialized
  stat:
    path: /etc/kubernetes/admin.conf
  register: kubeadm_init

- name: Initialize Kubernetes master
  command: >-
    kubeadm init
    --pod-network-cidr=10.244.0.0/16
    --apiserver-advertise-address={{ ansible_host }}
    --ignore-preflight-errors=NumCPU,Hostname
  when: not kubeadm_init.stat.exists

- name: Create .kube directory for debian user
  file:
    path: /home/debian/.kube
    state: directory
    owner: debian
    group: debian
    mode: '0755'

- name: Copy admin.conf to debian user
  copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/debian/.kube/config
    remote_src: yes
    owner: debian
    group: debian
    mode: '0644'

- name: Install Calico CNI
  become_user: debian
  command: kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.27.0/manifests/calico.yaml
  environment:
    KUBECONFIG: /home/debian/.kube/config
  when: not kubeadm_init.stat.exists

- name: Generate join command
  command: kubeadm token create --print-join-command
  register: join_command_output

- name: Set join command fact
  set_fact:
    join_command: "{{ join_command_output.stdout }}"
